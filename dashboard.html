<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<nav class="bg-blue-600 text-white p-4 flex justify-between">
    <h1 class="text-2xl font-bold">
        SISTec IoT Application 2026
    </h1>

    <h2 id="username"></h2>
</nav>


<div class="p-6">

    <!-- SECTION 1 -->

    <div class="grid grid-cols-2 gap-5">

        <div class="bg-white p-5 rounded shadow">

            <h1 class="text-2xl font-bold mb-3">
                Temperature
            </h1>

            <h2 id="temp"
                class="text-6xl font-bold text-red-500">
            </h2>

            <p id="tempDate"></p>

        </div>


        <div class="bg-white p-5 rounded shadow">

            <h1 class="text-2xl font-bold mb-3">
                Humidity
            </h1>

            <h2 id="hum"
                class="text-6xl font-bold text-blue-500">
            </h2>

            <p id="humDate"></p>

        </div>

    </div>


    <!-- SECTION 2 -->

    <div class="bg-white p-5 rounded shadow mt-6">

        <h1 class="text-2xl font-bold mb-4">
            LCD Text
        </h1>

        <input type="text"
            id="lcdText"
            maxlength="16"
            class="border p-3 w-full mb-4">

        <button onclick="saveText()"
            class="bg-green-500 text-white p-3">
            Submit
        </button>

    </div>


    <!-- SECTION 3 -->

    <div class="bg-white p-5 rounded shadow mt-6">

        <h1 class="text-2xl font-bold mb-4">
            Sensor Records
        </h1>

        <table class="w-full border">

            <thead>

                <tr class="bg-gray-200">

                    <th class="border p-2">#</th>
                    <th class="border p-2">Temperature</th>
                    <th class="border p-2">Humidity</th>
                    <th class="border p-2">Time</th>
                    <th class="border p-2">Date</th>
                    <th class="border p-2">Action</th>

                </tr>

            </thead>

            <tbody id="tableData"></tbody>

        </table>

    </div>

</div>


<script>

fetch("/getUser")
.then(res => res.json())
.then(data => {

    document.getElementById("username").innerHTML =
        data.name;

});


fetch("/latest")
.then(res => res.json())
.then(data => {

    document.getElementById("temp").innerHTML =
        data.temperature + " °C";

    document.getElementById("hum").innerHTML =
        data.humidity + " %";

    document.getElementById("tempDate").innerHTML =
        data.date + " " + data.time;

    document.getElementById("humDate").innerHTML =
        data.date + " " + data.time;

});


fetch("/records")
.then(res => res.json())
.then(data => {

    let output = "";

    data.forEach((item, index) => {

        output += `
        <tr>

            <td class="border p-2">${index + 1}</td>

            <td class="border p-2">
                ${item.temperature} °C
            </td>

            <td class="border p-2">
                ${item.humidity} %
            </td>

            <td class="border p-2">
                ${item.time}
            </td>

            <td class="border p-2">
                ${item.date}
            </td>

            <td class="border p-2">

                <a href="/delete/${item.id}"
                    class="bg-red-500 text-white px-3 py-1">

                    Delete

                </a>

            </td>

        </tr>
        `;

    });

    document.getElementById("tableData").innerHTML =
        output;

});


function saveText() {

    const text =
        document.getElementById("lcdText").value;

    fetch("/saveText", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            text: text
        })

    })

    .then(res => res.text())
    .then(data => {

        alert("Saved");

    });

}

</script>

</body>
</html>
